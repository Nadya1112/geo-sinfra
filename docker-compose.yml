version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: geo-sinfra-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - geo-sinfra-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - geo-sinfra-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-geo_sinfra}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-user}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - geo-sinfra-network

  ai-bridge:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: geo-sinfra-ai
    restart: unless-stopped
    command: python ai_bridge.py
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    networks:
      - geo-sinfra-network

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: geo-sinfra-ai
    restart: unless-stopped
    command: python ai_worker.py
    volumes:
      - ./:/app
    depends_on:
      - db
    networks:
      - geo-sinfra-network

networks:
  geo-sinfra-network:
    driver: bridge

volumes:
  db-data:
